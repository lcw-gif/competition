<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無人機障礙賽計分系統</title>
<style>
  :root {
    --bg: #0f1923; --card: #1a2736; --accent: #00d4ff;
    --orange: #ff8c00; --purple: #b366ff; --green: #00e676;
    --red: #ff4444; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
    --text: #e8edf2; --text-dim: #8899aa; --border: #2a3a4a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* ====== TOP BAR ====== */
  .topbar {
    background:linear-gradient(135deg,#1a2736,#0d1520); border-bottom:2px solid var(--accent);
    padding:10px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; z-index:50;
  }
  .topbar h1 { font-size:16px; color:var(--accent); white-space:nowrap; }
  .teams { display:flex; gap:6px; flex-wrap:wrap; }
  .team-chip {
    padding:6px 14px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;
    border:2px solid transparent; transition:all .2s; display:flex; align-items:center; gap:6px;
  }
  .team-chip.active { transform:scale(1.05); box-shadow:0 2px 10px rgba(0,0,0,.3); }
  .team-chip[data-t="0"]{background:#1e3a5f;border-color:#2980b9}
  .team-chip[data-t="0"].active{background:#2980b9;color:#fff}
  .team-chip[data-t="1"]{background:#3a1e5f;border-color:#8e44ad}
  .team-chip[data-t="1"].active{background:#8e44ad;color:#fff}
  .team-chip[data-t="2"]{background:#5f3a1e;border-color:#e67e22}
  .team-chip[data-t="2"].active{background:#e67e22;color:#fff}
  .team-chip[data-t="3"]{background:#1e5f3a;border-color:#27ae60}
  .team-chip[data-t="3"].active{background:#27ae60;color:#fff}
  .tname { background:transparent; border:none; border-bottom:1px dashed #556; color:inherit; font:inherit; font-size:13px; width:64px; text-align:center; outline:none; }
  .tname:focus { border-bottom-color:var(--accent); }

  .members { display:flex; gap:5px; }
  .mchip {
    padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer;
    border:2px solid var(--border); background:var(--card); color:var(--text-dim); transition:all .2s;
  }
  .mchip.active { border-color:var(--accent); background:rgba(0,212,255,.1); color:var(--accent); font-weight:600; }
  .mname { background:transparent; border:none; border-bottom:1px dashed #556; color:inherit; font:inherit; font-size:12px; width:52px; outline:none; }
  .mbadge { background:var(--accent); color:#000; border-radius:8px; padding:0 5px; font-size:10px; font-weight:700; margin-left:3px; }

  .timer-box { display:flex; align-items:center; gap:10px; margin-left:auto; }
  .timer { font-size:36px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:2px; color:var(--green); min-width:110px; text-align:center; }
  .timer.warning { color:var(--orange); }
  .timer.danger { color:var(--red); animation:pulse 1s infinite; }
  @keyframes pulse { 50%{opacity:.4} }
  .cur-score { font-size:20px; font-weight:700; color:var(--accent); white-space:nowrap; }
  .btn { padding:6px 14px; border:none; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; color:#fff; }
  .btn:hover { filter:brightness(1.15); }
  .btn-g { background:var(--green); color:#000; }
  .btn-o { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  .btn-o:hover { border-color:var(--accent); color:var(--accent); }
  .btn-r { background:var(--red); }

  .actions { display:flex; gap:6px; }
  .topbar-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }

  /* ====== MAP AREA ====== */
  .map-wrap {
    position:relative; width:100%; max-width:900px; margin:12px auto; aspect-ratio:7/8;
    /* This maintains the whiteboard aspect ratio */
  }
  .map-canvas {
    position:absolute; inset:0; border:3px solid #3a6ea5; border-radius:8px;
    background:linear-gradient(180deg, #111d28 0%, #0d1520 100%);
  }

  /* SVG path overlay */
  .map-svg {
    position:absolute; inset:0; width:100%; height:100%; pointer-events:none;
  }

  /* Scoring buttons on map */
  .map-btn {
    position:absolute; transform:translate(-50%,-50%);
    width:56px; height:56px; border-radius:50%; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; transition:all .25s; user-select:none;
    border:2px solid; z-index:10; line-height:1.1;
  }
  .map-btn:hover { transform:translate(-50%,-50%) scale(1.15); z-index:20; }
  .map-btn .pts { font-size:16px; font-weight:800; }
  .map-btn .lbl { font-size:9px; opacity:.8; margin-top:1px; }

  /* Obstacle buttons (orange) */
  .map-btn.obs {
    background:rgba(255,140,0,.15); border-color:var(--orange); color:var(--orange);
  }
  .map-btn.obs.scored {
    background:rgba(255,140,0,.5); border-color:#ffa500; color:#fff;
    box-shadow:0 0 16px rgba(255,140,0,.5);
  }
  /* Target buttons (purple) */
  .map-btn.tgt {
    background:rgba(179,102,255,.15); border-color:var(--purple); color:var(--purple);
  }
  .map-btn.tgt.scored {
    background:rgba(179,102,255,.5); border-color:#c77dff; color:#fff;
    box-shadow:0 0 16px rgba(179,102,255,.5);
  }
  /* Bonus buttons (green) */
  .map-btn.bon {
    background:rgba(0,230,118,.15); border-color:var(--green); color:var(--green);
  }
  .map-btn.bon.scored {
    background:rgba(0,230,118,.5); border-color:#69f0ae; color:#fff;
    box-shadow:0 0 16px rgba(0,230,118,.5);
  }
  .map-btn .check {
    display:none; position:absolute; top:-4px; right:-4px; width:20px; height:20px;
    background:var(--green); border-radius:50%; align-items:center; justify-content:center;
    font-size:12px; color:#000; font-weight:bold;
  }
  .map-btn.scored .check { display:flex; }

  /* ====== LEGEND + SIDEBAR ====== */
  .bottom-bar {
    display:flex; gap:12px; max-width:900px; margin:0 auto 16px; padding:0 12px; flex-wrap:wrap;
  }
  .legend {
    display:flex; gap:16px; align-items:center; padding:8px 16px;
    background:var(--card); border-radius:8px; border:1px solid var(--border); font-size:12px;
  }
  .legend-dot { width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:4px; }

  .lb-card { flex:1; min-width:260px; background:var(--card); border-radius:10px; border:1px solid var(--border); overflow:hidden; }
  .lb-hdr { padding:8px 12px; font-size:13px; font-weight:700; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
  .lb-row { display:flex; align-items:center; padding:7px 12px; border-bottom:1px solid rgba(255,255,255,.04); }
  .lb-row:last-child { border-bottom:none; }
  .rank { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; margin-right:8px; flex-shrink:0; }
  .rank-1{background:var(--gold);color:#000} .rank-2{background:var(--silver);color:#000}
  .rank-3{background:var(--bronze);color:#000} .rank-4{background:var(--border);color:var(--text-dim)}
  .lb-name { flex:1; font-weight:600; font-size:13px; }
  .lb-score { font-size:18px; font-weight:700; color:var(--accent); }
  .lb-avg { font-size:10px; color:var(--text-dim); text-align:right; margin-left:6px; }

  /* ====== MODAL ====== */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100; align-items:center; justify-content:center; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--card); border-radius:14px; border:2px solid var(--accent); padding:20px; max-width:620px; width:92%; max-height:80vh; overflow-y:auto; }
  .modal h2 { color:var(--accent); margin-bottom:12px; text-align:center; font-size:18px; }
  .modal table { width:100%; border-collapse:collapse; margin:10px 0; }
  .modal th,.modal td { padding:6px 8px; text-align:center; border-bottom:1px solid var(--border); font-size:13px; }
  .modal th { color:var(--text-dim); font-weight:600; font-size:11px; }
  .modal .champ { background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.05)); }
  .modal .champ td:first-child::before { content:'🏆 '; }

  .toast {
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--card); border:1px solid var(--accent); color:var(--text);
    padding:10px 20px; border-radius:10px; font-size:13px; font-weight:600;
    z-index:200; transition:transform .3s; box-shadow:0 4px 16px rgba(0,0,0,.4);
  }
  .toast.show { transform:translateX(-50%) translateY(0); }

  @media(max-width:600px){
    .map-btn { width:44px; height:44px; }
    .map-btn .pts { font-size:13px; }
    .map-btn .lbl { font-size:7px; }
    .timer { font-size:28px; min-width:85px; }
    .topbar h1 { font-size:13px; }
  }
</style>
</head>
<body>

<!-- TOP BAR: teams, members, timer -->
<div class="topbar">
  <h1>🚁 無人機障礙賽</h1>
  <div class="teams" id="teams"></div>
  <div class="members" id="members"></div>
  <div class="topbar-right">
    <div class="timer-box">
      <button class="btn btn-g" id="timerBtn" onclick="toggleTimer()">▶ 開始</button>
      <div class="timer" id="timer">08:00</div>
      <div class="cur-score"><span id="curScore">0</span> / 140</div>
    </div>
    <div class="actions">
      <button class="btn btn-o" onclick="showSummary()">📊</button>
      <button class="btn btn-o" onclick="exportCSV()">📋</button>
      <button class="btn btn-r" onclick="resetAll()">🔄</button>
    </div>
  </div>
</div>

<!-- MAP -->
<div class="map-wrap" id="mapWrap">
  <div class="map-canvas"></div>

  <!-- SVG: course boundary + flight path -->
  <svg class="map-svg" viewBox="0 0 700 800" preserveAspectRatio="xMidYMid meet">
    <!-- Course boundary (blue rectangle) -->
    <rect x="80" y="120" width="540" height="600" rx="8" fill="none" stroke="#3a6ea5" stroke-width="3" stroke-dasharray="8,4"/>
    <!-- Flight path (red curved arrows) -->
    <path d="M 130 170 C 130 170, 160 250, 200 280 C 240 310, 280 290, 310 300
             C 340 310, 360 430, 390 480 C 420 530, 350 540, 300 530
             C 250 520, 220 540, 200 570 C 180 600, 180 640, 200 670
             C 220 700, 280 700, 300 700 C 320 700, 400 680, 430 650
             C 460 620, 470 590, 470 560 C 470 530, 470 500, 460 480
             C 450 460, 500 420, 510 380 C 520 340, 520 300, 500 260
             C 480 220, 440 200, 420 190"
          fill="none" stroke="#ff4444" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.6"
          marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#ff4444" opacity="0.6"/>
      </marker>
    </defs>
    <!-- Start/End markers -->
    <text x="100" y="160" fill="#ff69b4" font-size="18" font-weight="bold">D</text>
    <text x="410" y="180" fill="#ff69b4" font-size="18" font-weight="bold">D</text>
    <rect x="88" y="140" width="24" height="24" rx="3" fill="none" stroke="#ff69b4" stroke-width="2"/>
    <rect x="400" y="162" width="24" height="24" rx="3" fill="none" stroke="#ff69b4" stroke-width="2"/>
  </svg>

  <!-- Scoring buttons will be injected here by JS -->
  <div id="mapButtons"></div>
</div>

<!-- BOTTOM: legend + leaderboard -->
<div class="bottom-bar">
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--orange)"></span>關卡 5 分</span>
    <span><span class="legend-dot" style="background:var(--purple)"></span>標靶 10 分</span>
    <span><span class="legend-dot" style="background:var(--green)"></span>額外 10 分</span>
    <span><span class="legend-dot" style="background:#ff69b4"></span>起點 / 終點</span>
  </div>
  <div class="lb-card">
    <div class="lb-hdr">🏆 隊伍排名 <button class="btn btn-o" style="padding:2px 8px;font-size:11px" onclick="showSummary()">詳細</button></div>
    <div id="leaderboard"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ======== DATA ========
const COLORS = ['#2980b9','#8e44ad','#e67e22','#27ae60'];

// All scoring points with map positions (percentage of container)
// Positions calibrated from the whiteboard photo
const POINTS = [
  // Orange obstacles (10 × 5pts) — positions from photo analysis
  {id:'o1',  type:'obs', name:'關卡1',  desc:'起點停機坪',   pts:5, x:29, y:36},
  {id:'o2',  type:'obs', name:'關卡2',  desc:'第一繞柱',     pts:5, x:43, y:38},
  {id:'o3',  type:'obs', name:'關卡3',  desc:'穿越圓環',     pts:5, x:55, y:60},
  {id:'o4',  type:'obs', name:'關卡4',  desc:'H停機坪(上)',  pts:5, x:70, y:47},
  {id:'o5',  type:'obs', name:'關卡5',  desc:'繞過障礙柱',   pts:5, x:30, y:60},
  {id:'o6',  type:'obs', name:'關卡6',  desc:'低飛橫杆',     pts:5, x:27, y:72},
  {id:'o7',  type:'obs', name:'關卡7',  desc:'繞柱降落點',   pts:5, x:42, y:72},
  {id:'o8',  type:'obs', name:'關卡8',  desc:'疊塔繞行',     pts:5, x:66, y:71},
  {id:'o9',  type:'obs', name:'關卡9',  desc:'漏斗穿越',     pts:5, x:66, y:88},
  {id:'o10', type:'obs', name:'關卡10', desc:'直升機障礙',   pts:5, x:60, y:25},

  // Purple targets (7 × 10pts)
  {id:'t1', type:'tgt', name:'標靶1', desc:'左上角',   pts:10, x:20, y:32},
  {id:'t2', type:'tgt', name:'標靶2', desc:'左中',     pts:10, x:23, y:57},
  {id:'t3', type:'tgt', name:'標靶3', desc:'左下角',   pts:10, x:24, y:83},
  {id:'t4', type:'tgt', name:'標靶4', desc:'中央偏左', pts:10, x:42, y:55},
  {id:'t5', type:'tgt', name:'標靶5', desc:'中下',     pts:10, x:42, y:88},
  {id:'t6', type:'tgt', name:'標靶6', desc:'右上',     pts:10, x:78, y:36},
  {id:'t7', type:'tgt', name:'標靶7', desc:'右中',     pts:10, x:77, y:52},

  // Bonus
  {id:'b1', type:'bon', name:'終點H降落', desc:'成功降落', pts:10, x:60, y:25},
  {id:'b2', type:'bon', name:'吹走杯子',  desc:'成功吹走', pts:10, x:56, y:32},
];

// State
let S = load() || {teams:['A 隊','B 隊','C 隊','D 隊'].map(n=>({name:n, members:[{name:'隊員1',sc:{}},{name:'隊員2',sc:{}},{name:'隊員3',sc:{}}]}))};
let ci = 0, mi = 0; // current team/member index
let tSec = 480, tRun = false, tInt = null;

function save(){ try{localStorage.setItem('drone_sc',JSON.stringify(S))}catch(e){} }
function load(){ try{const d=localStorage.getItem('drone_sc');return d?JSON.parse(d):null}catch(e){return null} }
function mScore(m){ return Object.values(m.sc||{}).reduce((a,b)=>a+b,0) }

// ======== RENDER ========
function render(){
  renderTeams(); renderMembers(); renderMapButtons(); renderLB();
  document.getElementById('curScore').textContent = mScore(S.teams[ci].members[mi]);
}

function renderTeams(){
  document.getElementById('teams').innerHTML = S.teams.map((t,i)=>
    `<div class="team-chip ${i===ci?'active':''}" data-t="${i}" onclick="pickTeam(${i})">
      <input class="tname" value="${t.name}" onclick="event.stopPropagation()" onchange="S.teams[${i}].name=this.value;save();render()" maxlength="10">
    </div>`).join('');
}

function renderMembers(){
  document.getElementById('members').innerHTML = S.teams[ci].members.map((m,i)=>
    `<div class="mchip ${i===mi?'active':''}" onclick="pickMember(${i})">
      <input class="mname" value="${m.name}" onclick="event.stopPropagation()" onchange="S.teams[ci].members[${i}].name=this.value;save();render()" maxlength="8">
      <span class="mbadge">${mScore(m)}</span>
    </div>`).join('');
}

function renderMapButtons(){
  const c = document.getElementById('mapButtons');
  const m = S.teams[ci].members[mi];
  c.innerHTML = POINTS.map(p => {
    const scored = m.sc[p.id] ? 'scored' : '';
    return `<div class="map-btn ${p.type} ${scored}" style="left:${p.x}%;top:${p.y}%" onclick="toggle('${p.id}',${p.pts})" title="${p.desc}">
      <div class="check">✓</div>
      <span class="pts">${p.pts}</span>
      <span class="lbl">${p.name}</span>
    </div>`;
  }).join('');
}

function renderLB(){
  const ranked = S.teams.map((t,i)=>({i, name:t.name,
    total:t.members.reduce((s,m)=>s+mScore(m),0)})).sort((a,b)=>b.total-a.total);
  document.getElementById('leaderboard').innerHTML = ranked.map((r,i)=>
    `<div class="lb-row"><div class="rank rank-${i+1}">${i+1}</div>
     <div class="lb-name" style="color:${COLORS[r.i]}">${r.name}</div>
     <div class="lb-score">${r.total}</div>
     <div class="lb-avg">均 ${(r.total/3).toFixed(1)}</div></div>`).join('');
}

// ======== LOGIC ========
function pickTeam(i){ ci=i; mi=0; resetTimer(); render(); }
function pickMember(i){ mi=i; resetTimer(); render(); }

function toggle(id, pts){
  const m = S.teams[ci].members[mi];
  if(m.sc[id]) delete m.sc[id]; else m.sc[id]=pts;
  save(); render();
  showToast(`${m.name}：${mScore(m)} / 140`);
}

// ======== TIMER ========
function toggleTimer(){
  if(tRun) pauseTimer(); else startTimer();
}
function startTimer(){
  if(tRun) return; tRun=true;
  document.getElementById('timerBtn').textContent='⏸';
  tInt = setInterval(()=>{
    tSec--; if(tSec<=0){ tSec=0; pauseTimer(); showToast('⏰ 時間到！'); }
    showTime();
  },1000); showTime();
}
function pauseTimer(){ tRun=false; clearInterval(tInt); document.getElementById('timerBtn').textContent='▶'; }
function resetTimer(){ pauseTimer(); tSec=480; document.getElementById('timerBtn').textContent='▶ 開始'; showTime(); }
function showTime(){
  const m=Math.floor(tSec/60), s=tSec%60;
  const el=document.getElementById('timer');
  el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.className='timer'+(tSec<=60?' danger':tSec<=120?' warning':'');
}

// ======== ACTIONS ========
function resetAll(){
  if(!confirm('確定重設全部？')) return;
  S = {teams:['A 隊','B 隊','C 隊','D 隊'].map(n=>({name:n, members:[{name:'隊員1',sc:{}},{name:'隊員2',sc:{}},{name:'隊員3',sc:{}}]}))};
  ci=0; mi=0; resetTimer(); save(); render(); toast('已重設');
}

function showSummary(){
  const ranked = S.teams.map((t,i)=>({i, name:t.name,
    members:t.members.map(m=>({name:m.name, score:mScore(m)})),
    total:t.members.reduce((s,m)=>s+mScore(m),0)})).sort((a,b)=>b.total-a.total);
  document.getElementById('modalContent').innerHTML = `
    <h2>🏆 比賽結果</h2>
    <table><tr><th>名次</th><th>隊伍</th><th>隊員1</th><th>隊員2</th><th>隊員3</th><th>總分</th><th>平均</th></tr>
    ${ranked.map((r,i)=>`<tr class="${i===0?'champ':''}">
      <td>${['🥇','🥈','🥉','④'][i]}</td>
      <td style="color:${COLORS[r.i]};font-weight:700">${r.name}</td>
      ${r.members.map(m=>`<td>${m.name}<br><b>${m.score}</b></td>`).join('')}
      <td style="font-size:18px;font-weight:700;color:var(--accent)">${r.total}</td>
      <td style="color:var(--text-dim)">${(r.total/3).toFixed(1)}</td>
    </tr>`).join('')}</table>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--text-dim)">
      每人最高 140 分 ｜ 關卡 50 + 標靶 70 + H降落 10 + 吹杯 10<br>墜機則原地起飛，不扣分
    </div>
    <button class="btn btn-g" style="display:block;margin:12px auto 0" onclick="closeModal()">關閉</button>`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }

function exportCSV(){
  let csv='\uFEFF隊伍,隊員,關卡,標靶,額外,總分\n';
  S.teams.forEach(t=>{ t.members.forEach(m=>{
    const obs=POINTS.filter(p=>p.type==='obs').reduce((s,p)=>s+(m.sc[p.id]||0),0);
    const tgt=POINTS.filter(p=>p.type==='tgt').reduce((s,p)=>s+(m.sc[p.id]||0),0);
    const bon=POINTS.filter(p=>p.type==='bon').reduce((s,p)=>s+(m.sc[p.id]||0),0);
    csv+=`${t.name},${m.name},${obs},${tgt},${bon},${obs+tgt+bon}\n`;
  })});
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`scores_${new Date().toISOString().slice(0,10)}.csv`; a.click(); toast('已匯出');
}

function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function toast(msg){ showToast(msg); }

// ======== INIT ========
render(); showTime();
</script>
</body>
</html>
