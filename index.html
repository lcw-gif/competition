<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無人機障礙賽計分系統</title>
<style>
:root{--bg:#0f1923;--card:#1a2736;--accent:#00d4ff;--orange:#ff8c00;--purple:#b366ff;--green:#00e676;--red:#ff4444;--gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;--text:#e8edf2;--text-dim:#8899aa;--border:#2a3a4a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.topbar{background:linear-gradient(135deg,#1a2736,#0d1520);border-bottom:2px solid var(--accent);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:50}
.topbar h1{font-size:15px;color:var(--accent);white-space:nowrap}
.teams{display:flex;gap:5px;flex-wrap:wrap}
.team-chip{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:5px}
.team-chip.active{transform:scale(1.05);box-shadow:0 2px 10px rgba(0,0,0,.3)}
.team-chip[data-t="0"]{background:#1e3a5f;border-color:#2980b9}.team-chip[data-t="0"].active{background:#2980b9;color:#fff}
.team-chip[data-t="1"]{background:#5f1e1e;border-color:#e74c3c}.team-chip[data-t="1"].active{background:#e74c3c;color:#fff}
.team-chip[data-t="2"]{background:#5f5a1e;border-color:#f1c40f}.team-chip[data-t="2"].active{background:#f1c40f;color:#000}
.team-chip[data-t="3"]{background:#1e5f3a;border-color:#27ae60}.team-chip[data-t="3"].active{background:#27ae60;color:#fff}
.tname{background:transparent;border:none;border-bottom:1px dashed #556;color:inherit;font:inherit;font-size:12px;width:56px;text-align:center;outline:none}
.tname:focus{border-bottom-color:var(--accent)}
.members{display:flex;gap:4px}
.mchip{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:2px solid var(--border);background:var(--card);color:var(--text-dim);transition:all .2s}
.mchip.active{border-color:var(--accent);background:rgba(0,212,255,.1);color:var(--accent);font-weight:600}
.mname{background:transparent;border:none;border-bottom:1px dashed #556;color:inherit;font:inherit;font-size:11px;width:46px;outline:none}
.mbade{background:var(--accent);color:#000;border-radius:8px;padding:0 4px;font-size:9px;font-weight:700;margin-left:2px}
.timer-box{display:flex;align-items:center;gap:8px;margin-left:auto}
.timer{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;color:var(--green);min-width:140px;text-align:center}
.timer.warning{color:var(--orange)}.timer.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}
.cur-score{font-size:18px;font-weight:700;color:var(--accent);white-space:nowrap}
.btn{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;color:#fff}
.btn:hover{filter:brightness(1.15)}
.btn-g{background:var(--green);color:#000}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-r{background:var(--red)}
.actions{display:flex;gap:5px}

.map-wrap{position:relative;width:100%;max-width:750px;margin:10px auto;padding-bottom:60px;aspect-ratio:640/791}
.map-canvas{position:absolute;inset:0;border:3px solid #3a6ea5;border-radius:8px;background:linear-gradient(180deg,#111d28,#0d1520)}
.map-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

.map-btn{position:absolute;transform:translate(-50%,-50%);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;transition:all .25s;user-select:none;border:2px solid;z-index:10;line-height:1}
.map-btn:hover{transform:translate(-50%,-50%) scale(1.18);z-index:20}
.map-btn .pts{font-weight:800}
.map-btn .lbl{opacity:.85}
.map-btn .check{display:none;position:absolute;top:-5px;right:-5px;width:20px;height:20px;background:var(--green);border-radius:50%;align-items:center;justify-content:center;font-size:12px;color:#000;font-weight:bold}
.map-btn.scored .check{display:flex}

.map-btn.obs{width:50px;height:50px;border-radius:50%;background:rgba(255,140,0,.12);border-color:var(--orange);color:var(--orange);font-size:9px}
.map-btn.obs .pts{font-size:15px}
.map-btn.obs .lbl{font-size:8px;margin-top:1px}
.map-btn.obs.scored{background:rgba(255,140,0,.5);border-color:#ffa500;color:#fff;box-shadow:0 0 14px rgba(255,140,0,.5)}

.map-btn.tgt{width:44px;height:44px;border-radius:6px;background:rgba(179,102,255,.12);border-color:var(--purple);color:var(--purple);font-size:9px}
.map-btn.tgt .pts{font-size:15px}
.map-btn.tgt .lbl{font-size:8px;margin-top:1px}
.map-btn.tgt.scored{background:rgba(179,102,255,.5);border-color:#c77dff;color:#fff;box-shadow:0 0 14px rgba(179,102,255,.5)}

.map-btn.heli{width:54px;height:54px;border-radius:50%;background:rgba(0,230,118,.12);border-color:var(--green);color:var(--green);font-size:10px}
.map-btn.heli .pts{font-size:16px}
.map-btn.heli .lbl{font-size:8px;margin-top:1px}
.map-btn.heli.scored{background:rgba(0,230,118,.5);border-color:#69f0ae;color:#fff;box-shadow:0 0 14px rgba(0,230,118,.5)}

.map-btn.cup{width:48px;height:48px;border-radius:6px;background:rgba(180,180,180,.12);border-color:#aaa;color:#ccc;font-size:9px}
.map-btn.cup .pts{font-size:15px}
.map-btn.cup .lbl{font-size:8px;margin-top:1px}
.map-btn.cup.scored{background:rgba(180,180,180,.4);border-color:#ddd;color:#fff;box-shadow:0 0 14px rgba(180,180,180,.4)}

.route-label{position:absolute;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:#ff69b4;pointer-events:none;z-index:6;text-shadow:0 0 6px rgba(255,105,180,.4)}

.bottom-bar{display:flex;gap:10px;max-width:750px;margin:0 auto 14px;padding:0 10px;flex-wrap:wrap}
.legend{display:flex;gap:14px;align-items:center;padding:7px 14px;background:var(--card);border-radius:8px;border:1px solid var(--border);font-size:11px;flex-wrap:wrap}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px}
.legend-dot.circle{border-radius:50%}
.lb-card{flex:1;min-width:240px;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.lb-hdr{padding:7px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.lb-row{display:flex;align-items:center;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.04)}
.lb-row:last-child{border-bottom:none}
.rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-right:7px;flex-shrink:0}
.rank-1{background:var(--gold);color:#000}.rank-2{background:var(--silver);color:#000}.rank-3{background:var(--bronze);color:#000}.rank-4{background:var(--border);color:var(--text-dim)}
.lb-name{flex:1;font-weight:600;font-size:12px}.lb-score{font-size:16px;font-weight:700;color:var(--accent)}
.lb-avg{font-size:9px;color:var(--text-dim);text-align:right;margin-left:5px}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:14px;border:2px solid var(--accent);padding:18px;max-width:600px;width:92%;max-height:80vh;overflow-y:auto}
.modal h2{color:var(--accent);margin-bottom:10px;text-align:center;font-size:17px}
.modal table{width:100%;border-collapse:collapse;margin:8px 0}
.modal th,.modal td{padding:5px 7px;text-align:center;border-bottom:1px solid var(--border);font-size:12px}
.modal th{color:var(--text-dim);font-weight:600;font-size:10px}
.modal .champ{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.05))}
.modal .champ td:first-child::before{content:'🏆 '}

.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:9px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:200;transition:transform .3s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .map-btn.obs{width:38px;height:38px;font-size:7px}.map-btn.obs .pts{font-size:12px}
  .map-btn.tgt{width:34px;height:34px;font-size:7px}.map-btn.tgt .pts{font-size:12px}
  .map-btn.heli{width:42px;height:42px;font-size:8px}.map-btn.heli .pts{font-size:13px}
  .map-btn.cup{width:36px;height:36px;font-size:7px}.map-btn.cup .pts{font-size:12px}
  .timer{font-size:24px;min-width:120px}.topbar h1{font-size:12px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🚁 無人機障礙賽</h1>
  <div class="teams" id="teams"></div>
  <div class="members" id="members"></div>
  <div class="timer-box">
    <button class="btn btn-g" id="timerBtn" onclick="toggleTimer()">▶</button>
    <button class="btn btn-o" onclick="resetTimer()" title="重設計時器">↺</button>
    <div class="timer" id="timer">08:00</div>
    <div class="cur-score"><span id="curScore">0</span>/140</div>
    <div class="actions">
      <button class="btn btn-o" onclick="showSummary()">📊</button>
      <button class="btn btn-o" onclick="exportCSV()">📋</button>
      <button class="btn btn-r" onclick="resetAll()">🔄</button>
    </div>
  </div>
</div>

<div class="map-wrap" id="mapWrap">
  <div class="map-canvas"></div>
  <svg class="map-svg" viewBox="0 0 640 731" preserveAspectRatio="xMidYMid meet">
    <rect x="68" y="92" width="472" height="614" rx="6" fill="none" stroke="#3a6ea5" stroke-width="2.5" stroke-dasharray="8,4"/>
    <!-- Red path drawn by JS to match button positions -->
    <path id="flightPath" fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
    <defs><marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#ff4444" opacity="0.5"/></marker></defs>
  </svg>
  <div class="route-label" style="left:69%;top:26%">起點 ▲</div>
  <div class="route-label" style="left:67%;top:93%">終點 ▼</div>
  <div id="mapButtons"></div>
</div>

<div class="bottom-bar">
  <div class="legend">
    <span><span class="legend-dot circle" style="background:var(--orange)"></span>關卡 5分×10</span>
    <span><span class="legend-dot" style="background:var(--purple)"></span>標靶 10分×7</span>
    <span><span class="legend-dot circle" style="background:var(--green)"></span>H降落 10分</span>
    <span><span class="legend-dot" style="background:#aaa"></span>吹杯 10分</span>
  </div>
  <div class="lb-card">
    <div class="lb-hdr">🏆 排名 <button class="btn btn-o" style="padding:2px 7px;font-size:10px" onclick="showSummary()">詳細</button></div>
    <div id="leaderboard"></div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const COLORS=['#2980b9','#e74c3c','#f1c40f','#27ae60'];

const OBS=[
  {id:'o1', name:'關卡1',  desc:'起點',           pts:5, x:69.0, y:26.0},
  {id:'o2', name:'關卡2',  desc:'半圓(標靶1右)',   pts:5, x:21.0, y:34.7},
  {id:'o3', name:'關卡3',  desc:'半圓(關卡2右)',   pts:5, x:30.0, y:34.7},
  {id:'o4', name:'關卡4',  desc:'半圓(紅線上)',    pts:5, x:58.0, y:43.0},
  {id:'o5', name:'關卡5',  desc:'橫向圓柱(左移)',  pts:5, x:38.0, y:63.0},
  {id:'o6', name:'關卡6',  desc:'半圓+支架(左下)', pts:5, x:26.1, y:78.2},
  {id:'o7', name:'關卡7',  desc:'半圓+支架(中下)', pts:5, x:45.1, y:79.2},
  {id:'o8', name:'關卡8',  desc:'直立圓柱(左移)',  pts:5, x:68.0, y:79.0},
  {id:'o9', name:'關卡9',  desc:'半圓(標靶4上方)', pts:5, x:48.3, y:86.0},
  {id:'o10',name:'關卡10', desc:'角落上方',       pts:5, x:66.9, y:87.0},
];

const TGT=[
  {id:'t1',name:'標靶1',desc:'左上',  pts:10, x:12.0, y:34.7},
  {id:'t2',name:'標靶2',desc:'左中',  pts:10, x:24.4, y:65.8},
  {id:'t3',name:'標靶3',desc:'左下',  pts:10, x:26.6, y:89.0},
  {id:'t4',name:'標靶4',desc:'中下',  pts:10, x:48.3, y:93.0},
  {id:'t5',name:'標靶5',desc:'中央',  pts:10, x:50.0, y:63.0},
  {id:'t6',name:'標靶6',desc:'右上',  pts:10, x:82.3, y:44.3},
  {id:'t7',name:'標靶7',desc:'右中',  pts:10, x:84.4, y:64.2},
];

const BON=[
  {id:'b1',name:'終點H降落',desc:'成功降落',pts:10, x:66.9, y:94.0, shape:'heli'},
  {id:'b2',name:'吹走杯子', desc:'灰色方塊',pts:10, x:58.6, y:78.0, shape:'cup'},
];

const ALL=[...OBS.map(o=>({...o,type:'obs'})),...TGT.map(t=>({...t,type:'tgt'})),...BON.map(b=>({...b,type:b.shape||'bon'}))];

let S=load()||{teams:['A 隊','B 隊','C 隊','D 隊'].map(n=>({name:n,members:[{name:'隊員1',sc:{}},{name:'隊員2',sc:{}},{name:'隊員3',sc:{}}]}))};
let ci=0,mi=0,tMs=480000,tRun=false,tInt=null;

function save(){try{localStorage.setItem('drone_sc',JSON.stringify(S))}catch(e){}}
function load(){try{const d=localStorage.getItem('drone_sc');return d?JSON.parse(d):null}catch(e){return null}}
function mScore(m){return Object.values(m.sc||{}).reduce((a,b)=>a+b,0)}

function render(){
  renderTeams();renderMembers();renderMap();renderLB();
  document.getElementById('curScore').textContent=mScore(S.teams[ci].members[mi]);
}
function renderTeams(){
  document.getElementById('teams').innerHTML=S.teams.map((t,i)=>
    '<div class="team-chip '+(i===ci?'active':'')+'" data-t="'+i+'" onclick="pickTeam('+i+')"><input class="tname" value="'+t.name+'" onclick="event.stopPropagation()" onchange="S.teams['+i+'].name=this.value;save();render()" maxlength="10"></div>').join('');
}
function renderMembers(){
  document.getElementById('members').innerHTML=S.teams[ci].members.map((m,i)=>
    '<div class="mchip '+(i===mi?'active':'')+'" onclick="pickMember('+i+')"><input class="mname" value="'+m.name+'" onclick="event.stopPropagation()" onchange="S.teams[ci].members['+i+'].name=this.value;save();render()" maxlength="8"><span class="mbadge">'+mScore(m)+'</span></div>').join('');
}
function renderMap(){
  const m=S.teams[ci].members[mi];
  document.getElementById('mapButtons').innerHTML=ALL.map(p=>{
    const scored=m.sc[p.id]?'scored':'';
    return '<div class="map-btn '+p.type+' '+scored+'" style="left:'+p.x+'%;top:'+p.y+'%" onclick="toggle(\''+p.id+'\','+p.pts+')" title="'+p.desc+'"><div class="check">✓</div><span class="pts">'+p.pts+'</span><span class="lbl">'+p.name+'</span></div>';
  }).join('');
}
function renderLB(){
  const ranked=S.teams.map((t,i)=>({i,name:t.name,total:t.members.reduce((s,m)=>s+mScore(m),0)})).sort((a,b)=>b.total-a.total);
  document.getElementById('leaderboard').innerHTML=ranked.map((r,i)=>
    '<div class="lb-row"><div class="rank rank-'+(i+1)+'">'+(i+1)+'</div><div class="lb-name" style="color:'+COLORS[r.i]+'">'+r.name+'</div><div class="lb-score">'+r.total+'</div><div class="lb-avg">均'+(r.total/3).toFixed(1)+'</div></div>').join('');
}

function pickTeam(i){ci=i;mi=0;resetTimer();render()}
function pickMember(i){mi=i;resetTimer();render()}
function toggle(id,pts){
  const m=S.teams[ci].members[mi];
  if(m.sc[id])delete m.sc[id];else m.sc[id]=pts;
  save();render();showToast(m.name+'：'+mScore(m)+'/140');
}

function toggleTimer(){if(tRun)pauseTimer();else startTimer()}
function startTimer(){if(tRun)return;tRun=true;document.getElementById('timerBtn').textContent='⏸';const t0=performance.now()-((480000-tMs));tInt=setInterval(()=>{tMs=Math.max(0,480000-(performance.now()-t0));if(tMs<=0){tMs=0;pauseTimer();showToast('⏰ 時間到！')}showTime()},33);showTime()}
function pauseTimer(){tRun=false;clearInterval(tInt);document.getElementById('timerBtn').textContent='▶'}
function resetTimer(){pauseTimer();tMs=480000;document.getElementById('timerBtn').textContent='▶';showTime()}
function showTime(){const total=Math.ceil(tMs/1000);const m=Math.floor(total/60),s=total%60;const cs=Math.floor((tMs%1000)/10);const el=document.getElementById('timer');el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s+'.'+(cs<10?'0':'')+cs;el.className='timer'+(tMs<=60000?' danger':tMs<=120000?' warning':'')}

function resetAll(){if(!confirm('確定重設全部？'))return;S={teams:['A 隊','B 隊','C 隊','D 隊'].map(n=>({name:n,members:[{name:'隊員1',sc:{}},{name:'隊員2',sc:{}},{name:'隊員3',sc:{}}]}))};ci=0;mi=0;resetTimer();save();render();showToast('已重設')}

function showSummary(){
  const ranked=S.teams.map((t,i)=>({i,name:t.name,members:t.members.map(m=>({name:m.name,score:mScore(m)})),total:t.members.reduce((s,m)=>s+mScore(m),0)})).sort((a,b)=>b.total-a.total);
  document.getElementById('modalContent').innerHTML=
    '<h2>🏆 比賽結果</h2><table><tr><th>名次</th><th>隊伍</th><th>隊員1</th><th>隊員2</th><th>隊員3</th><th>總分</th><th>平均</th></tr>'+
    ranked.map((r,i)=>'<tr class="'+(i===0?'champ':'')+'"><td>'+['🥇','🥈','🥉','④'][i]+'</td><td style="color:'+COLORS[r.i]+';font-weight:700">'+r.name+'</td>'+
    r.members.map(m=>'<td>'+m.name+'<br><b>'+m.score+'</b></td>').join('')+
    '<td style="font-size:17px;font-weight:700;color:var(--accent)">'+r.total+'</td><td style="color:var(--text-dim)">'+(r.total/3).toFixed(1)+'</td></tr>').join('')+'</table>'+
    '<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text-dim)">每人最高140分｜關卡50+標靶70+H降落10+吹杯10｜墜機原地起飛</div>'+
    '<button class="btn btn-g" style="display:block;margin:10px auto 0" onclick="closeModal()">關閉</button>';
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){document.getElementById('modalBg').classList.remove('show')}

function exportCSV(){
  let csv='\uFEFF隊伍,隊員,關卡,標靶,額外,總分\n';
  S.teams.forEach(t=>{t.members.forEach(m=>{
    const obs=OBS.reduce((s,o)=>s+(m.sc[o.id]||0),0);
    const tgt=TGT.reduce((s,o)=>s+(m.sc[o.id]||0),0);
    const bon=BON.reduce((s,o)=>s+(m.sc[o.id]||0),0);
    csv+=t.name+','+m.name+','+obs+','+tgt+','+bon+','+(obs+tgt+bon)+'\n';
  })});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='scores_'+new Date().toISOString().slice(0,10)+'.csv';a.click();showToast('已匯出');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// Route order for the red flight path
const ROUTE=[
  {x:69.0,y:26.0},  // 起點 (關卡1)
  {x:12.0,y:34.7},  // 標靶1
  {x:21.0,y:34.7},  // 關卡2
  {x:30.0,y:34.7},  // 關卡3
  {x:58.0,y:43.0},  // 關卡4
  {x:50.0,y:63.0},  // 標靶5
  {x:38.0,y:63.0},  // 關卡5

  {x:45.1,y:79.2},  // 關卡7
  {x:58.6,y:78.0},  // 吹走杯子

  {x:66.9,y:94.0},  // 終點H降落
];

function drawPath(){
  const svg=document.querySelector('.map-svg');
  const wrap=document.getElementById('mapWrap');
  const canvas=wrap.querySelector('.map-canvas');
  const W=640, H=731;
  const cRect=canvas.getBoundingClientRect();
  const wRect=wrap.getBoundingClientRect();
  const offX=cRect.left-wRect.left, offY=cRect.top-wRect.top;
  const cW=cRect.width, cH=cRect.height;
  const pts=ROUTE.map(p=>({
    x:((offX+p.x/100*cW)/wRect.width)*W,
    y:((offY+p.y/100*cH)/wRect.height)*H
  }));
  let d='M '+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1);
  for(let i=1;i<pts.length;i++) d+=' L '+pts[i].x.toFixed(1)+' '+pts[i].y.toFixed(1);
  document.getElementById('flightPath').setAttribute('d',d);
}

render();showTime();
window.addEventListener('resize',drawPath);
setTimeout(drawPath,100);
</script>
